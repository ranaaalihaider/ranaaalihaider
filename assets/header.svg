<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#070d1f"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <!-- Glow orb behind text -->
  <ellipse cx="450" cy="95" rx="250" ry="80" fill="#1e40af" opacity="0.08"/>
  <ellipse cx="450" cy="95" rx="140" ry="50" fill="#7c3aed" opacity="0.06"/>

  <!-- Circuit lines LEFT -->
  <line x1="0" y1="32" x2="190" y2="32" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="75" y1="0" x2="75" y2="60" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="58" x2="140" y2="58" stroke="#818cf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="140" y1="0" x2="140" y2="58" stroke="#818cf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="170" x2="155" y2="170" stroke="#38bdf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="75" y1="170" x2="75" y2="200" stroke="#38bdf8" stroke-width="0.4" opacity="0.15"/>

  <!-- Circuit lines RIGHT -->
  <line x1="710" y1="32" x2="900" y2="32" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="825" y1="0" x2="825" y2="60" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="760" y1="58" x2="900" y2="58" stroke="#818cf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="760" y1="0" x2="760" y2="58" stroke="#818cf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="745" y1="170" x2="900" y2="170" stroke="#38bdf8" stroke-width="0.4" opacity="0.15"/>
  <line x1="825" y1="170" x2="825" y2="200" stroke="#38bdf8" stroke-width="0.4" opacity="0.15"/>

  <!-- Circuit nodes LEFT -->
  <circle cx="75" cy="32" r="3.5" fill="#020817" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
  <circle cx="75" cy="32" r="1.3" fill="#38bdf8" opacity="0.9"/>
  <circle cx="140" cy="58" r="3" fill="#020817" stroke="#818cf8" stroke-width="1" opacity="0.7"/>
  <circle cx="140" cy="58" r="1.2" fill="#818cf8" opacity="0.9"/>
  <circle cx="75" cy="170" r="3" fill="#020817" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <circle cx="75" cy="170" r="1.2" fill="#38bdf8" opacity="0.9"/>

  <!-- Circuit nodes RIGHT -->
  <circle cx="825" cy="32" r="3.5" fill="#020817" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
  <circle cx="825" cy="32" r="1.3" fill="#38bdf8" opacity="0.9"/>
  <circle cx="760" cy="58" r="3" fill="#020817" stroke="#818cf8" stroke-width="1" opacity="0.7"/>
  <circle cx="760" cy="58" r="1.2" fill="#818cf8" opacity="0.9"/>
  <circle cx="825" cy="170" r="3" fill="#020817" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <circle cx="825" cy="170" r="1.2" fill="#38bdf8" opacity="0.9"/>

  <!-- Floating dots decoration -->
  <circle cx="35" cy="50" r="1.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="200" cy="25" r="1" fill="#a78bfa" opacity="0.5"/>
  <circle cx="180" cy="80" r="1.2" fill="#818cf8" opacity="0.4"/>
  <circle cx="865" cy="50" r="1.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="700" cy="25" r="1" fill="#a78bfa" opacity="0.5"/>
  <circle cx="720" cy="80" r="1.2" fill="#818cf8" opacity="0.4"/>
  <circle cx="20" cy="175" r="1.2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="880" cy="175" r="1.2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="230" cy="185" r="1" fill="#818cf8" opacity="0.3"/>
  <circle cx="670" cy="185" r="1" fill="#818cf8" opacity="0.3"/>

  <!-- Corner code brackets -->
  <text x="15" y="55" font-family="monospace" font-size="36" fill="#38bdf8" opacity="0.2" font-weight="bold">{</text>
  <text x="858" y="55" font-family="monospace" font-size="36" fill="#38bdf8" opacity="0.2" font-weight="bold">}</text>

  <!-- Tag label above name -->
  <text x="450" y="58" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#38bdf8" opacity="0.55" filter="url(#softGlow)">&lt; developer /&gt;</text>

  <!-- Main Name with glow -->
  <text x="452" y="102" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#1a2540" letter-spacing="4">Rana Ali Haider</text>
  <text x="450" y="100" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#nameGrad)" filter="url(#glow)" letter-spacing="4">Rana Ali Haider</text>

  <!-- Shimmer underline -->
  <rect x="200" y="114" width="500" height="1.5" rx="1" fill="url(#shimmer)" opacity="0.9"/>

  <!-- Role pills -->
  <rect x="115" y="126" width="126" height="22" rx="11" fill="url(#pill1)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="178" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#38bdf8" font-weight="bold">Software Engineer</text>

  <rect x="252" y="126" width="108" height="22" rx="11" fill="url(#pill2)" stroke="#818cf8" stroke-width="0.8"/>
  <text x="306" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#818cf8" font-weight="bold">ERP Developer</text>

  <rect x="371" y="126" width="100" height="22" rx="11" fill="url(#pill2)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="421" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#a78bfa" font-weight="bold">MERN / Laravel</text>

  <rect x="482" y="126" width="90" height="22" rx="11" fill="url(#pill3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="527" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#34d399" font-weight="bold">IoT Engineer</text>

  <rect x="583" y="126" width="100" height="22" rx="11" fill="url(#pill4)" stroke="#c084fc" stroke-width="0.8"/>
  <text x="633" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#c084fc" font-weight="bold">AI / ML Builder</text>

  <rect x="694" y="126" width="90" height="22" rx="11" fill="url(#pill5)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="739" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="9.5" fill="#fb7185" font-weight="bold">Flutter Dev</text>

  <!-- Bottom wave -->
  <path d="M0,175 C120,165 240,182 400,172 C560,162 700,178 900,168 L900,200 L0,200 Z" fill="#0d1117" opacity="0.5"/>
  <path d="M0,185 C200,177 400,190 600,182 C750,175 860,185 900,183 L900,200 L0,200 Z" fill="#0d1117" opacity="0.9"/>
</svg>
