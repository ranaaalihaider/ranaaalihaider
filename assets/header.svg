<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a1b27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Wave bottom -->
  <path d="M0,140 C150,180 300,110 450,150 C600,190 750,120 900,155 L900,200 L0,200 Z" fill="#161b22" opacity="0.8"/>
  <path d="M0,160 C200,130 400,175 600,148 C750,128 850,165 900,160 L900,200 L0,200 Z" fill="#0d1117" opacity="0.9"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="40" r="3" fill="#38bdf8" opacity="0.6"/>
  <circle cx="80" cy="20" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="840" cy="35" r="3" fill="#38bdf8" opacity="0.6"/>
  <circle cx="870" cy="60" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="120" cy="65" r="1.5" fill="#38bdf8" opacity="0.4"/>
  <circle cx="780" cy="25" r="1.5" fill="#818cf8" opacity="0.4"/>
  <circle cx="200" cy="30" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="700" cy="50" r="2" fill="#38bdf8" opacity="0.3"/>

  <!-- Code brackets decoration -->
  <text x="60" y="105" font-family="monospace" font-size="60" fill="#38bdf8" opacity="0.08" font-weight="bold">{</text>
  <text x="800" y="105" font-family="monospace" font-size="60" fill="#38bdf8" opacity="0.08" font-weight="bold">}</text>

  <!-- Main Name -->
  <text x="450" y="90" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">Rana Ali Haider</text>

  <!-- Subtitle -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="2">Software Engineer  ·  ERP Developer  ·  IoT &amp; AI Builder</text>
</svg>
