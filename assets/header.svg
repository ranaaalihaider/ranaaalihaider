<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="40%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#070d1f"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#818cf8;#a78bfa;#38bdf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#a78bfa;#38bdf8;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#38bdf8;#818cf8;#a78bfa" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- Circuit grid lines (horizontal) -->
  <line x1="0" y1="30" x2="220" y2="30" stroke="#38bdf8" stroke-width="0.3" opacity="0.15"/>
  <line x1="680" y1="30" x2="900" y2="30" stroke="#38bdf8" stroke-width="0.3" opacity="0.15"/>
  <line x1="0" y1="60" x2="160" y2="60" stroke="#818cf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="740" y1="60" x2="900" y2="60" stroke="#818cf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="160" x2="180" y2="160" stroke="#38bdf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="720" y1="160" x2="900" y2="160" stroke="#38bdf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="190" x2="120" y2="190" stroke="#818cf8" stroke-width="0.3" opacity="0.1"/>
  <line x1="780" y1="190" x2="900" y2="190" stroke="#818cf8" stroke-width="0.3" opacity="0.1"/>

  <!-- Circuit vertical lines -->
  <line x1="80" y1="0" x2="80" y2="70" stroke="#38bdf8" stroke-width="0.3" opacity="0.15"/>
  <line x1="160" y1="0" x2="160" y2="50" stroke="#818cf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="820" y1="0" x2="820" y2="70" stroke="#38bdf8" stroke-width="0.3" opacity="0.15"/>
  <line x1="740" y1="0" x2="740" y2="50" stroke="#818cf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="80" y1="150" x2="80" y2="220" stroke="#38bdf8" stroke-width="0.3" opacity="0.12"/>
  <line x1="820" y1="150" x2="820" y2="220" stroke="#38bdf8" stroke-width="0.3" opacity="0.12"/>

  <!-- Circuit nodes -->
  <circle cx="80" cy="30" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <circle cx="80" cy="30" r="1" fill="#38bdf8" opacity="0.8"/>
  <circle cx="160" cy="60" r="2.5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="160" cy="60" r="1" fill="#818cf8" opacity="0.7"/>
  <circle cx="820" cy="30" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <circle cx="820" cy="30" r="1" fill="#38bdf8" opacity="0.8"/>
  <circle cx="740" cy="60" r="2.5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="740" cy="60" r="1" fill="#818cf8" opacity="0.7"/>
  <circle cx="80" cy="160" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <circle cx="80" cy="160" r="1" fill="#38bdf8" opacity="0.7"/>
  <circle cx="820" cy="160" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <circle cx="820" cy="160" r="1" fill="#38bdf8" opacity="0.7"/>

  <!-- Floating particles (animated) -->
  <circle cx="50" cy="50" r="1.5" fill="#38bdf8" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;44;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="25" r="1" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="25;20;25" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="45" r="1.2" fill="#818cf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="50" r="1.5" fill="#38bdf8" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;44;50" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="25" r="1" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="25;20;25" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="45" r="1.2" fill="#818cf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="180" r="1.2" fill="#38bdf8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="180" r="1.2" fill="#38bdf8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle background glow orbs -->
  <ellipse cx="450" cy="100" rx="220" ry="70" fill="#1e40af" opacity="0.06"/>
  <ellipse cx="450" cy="100" rx="130" ry="45" fill="#818cf8" opacity="0.05"/>

  <!-- Corner brackets (code style) -->
  <text x="18" y="42" font-family="monospace" font-size="28" fill="#38bdf8" opacity="0.25">[</text>
  <text x="860" y="42" font-family="monospace" font-size="28" fill="#38bdf8" opacity="0.25">]</text>

  <!-- Decorative tag above name -->
  <text x="450" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" opacity="0.6" filter="url(#softGlow)">&lt;developer&gt;</text>

  <!-- Main Name -->
  <text x="450" y="115" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="46" font-weight="900" fill="url(#nameGrad)" filter="url(#glow)" letter-spacing="3">Rana Ali Haider</text>

  <!-- Closing tag -->
  <text x="450" y="138" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" opacity="0.6" filter="url(#softGlow)">&lt;/developer&gt;</text>

  <!-- Divider line (animated shimmer) -->
  <rect x="150" y="148" width="600" height="1" fill="url(#lineGrad)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle pills -->
  <rect x="180" y="158" width="120" height="20" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="0.8" opacity="0.9"/>
  <text x="240" y="172" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#38bdf8">Software Engineer</text>

  <rect x="315" y="158" width="100" height="20" rx="10" fill="#0f172a" stroke="#818cf8" stroke-width="0.8" opacity="0.9"/>
  <text x="365" y="172" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#818cf8">ERP Developer</text>

  <rect x="430" y="158" width="90" height="20" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8" opacity="0.9"/>
  <text x="475" y="172" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#a78bfa">IoT Engineer</text>

  <rect x="535" y="158" width="85" height="20" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="0.8" opacity="0.9"/>
  <text x="577" y="172" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#34d399">AI Enthusiast</text>

  <rect x="635" y="158" width="90" height="20" rx="10" fill="#0f172a" stroke="#fb7185" stroke-width="0.8" opacity="0.9"/>
  <text x="680" y="172" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#fb7185">ML Developer</text>

  <!-- Bottom wave -->
  <path d="M0,200 C100,188 200,210 350,200 C500,190 650,210 800,198 C850,195 880,200 900,200 L900,220 L0,220 Z" fill="#161b22" opacity="0.7"/>
  <path d="M0,210 C150,202 300,215 450,208 C600,201 750,212 900,208 L900,220 L0,220 Z" fill="#0d1117" opacity="0.9"/>
</svg>
